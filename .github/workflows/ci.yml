name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    name: Lint & Testes
    runs-on: ubuntu-latest

    steps:
      steps:
      - uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt       <--- O DJANGO É INSTALADO AQUI

      - name: Aplicar migrações
        run: python manage.py migrate --run-syncdb  <--- AGORA ELE VAI FUNCIONAR

      - name: Executar testes
        run: pytest