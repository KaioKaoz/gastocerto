{% extends "gastos/base.html" %}

{% block content %}

<div class="card" style="max-width:500px; margin:0 auto;">
  <h2 style="margin-bottom:1.5rem; font-size:1.2rem;">{{ titulo }}</h2>

  <form method="post">
    {% csrf_token %}

    {% for field in form %}
      <div>
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <ul class="errorlist">
            {% for error in field.errors %}
              <li>{{ error }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      </div>
    {% endfor %}

    <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
      <button type="submit" class="btn btn-primary">💾 Salvar</button>
      <a href="{% url 'lista_gastos' %}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

{% endblock %}
