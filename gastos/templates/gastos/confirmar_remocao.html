{% extends "gastos/base.html" %}

{% block content %}

<div class="card" style="max-width:480px; margin:0 auto; text-align:center;">
  <div style="font-size:3rem; margin-bottom:1rem;">⚠️</div>
  <h2 style="margin-bottom:0.75rem;">Confirmar Remoção</h2>
  <p style="color:#718096; margin-bottom:1.5rem;">
    Tem certeza que deseja remover o gasto:<br>
    <strong>{{ gasto.descricao }}</strong> — R$ {{ gasto.valor }}?
  </p>
  <form method="post" style="display:flex; gap:0.75rem; justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">🗑️ Sim, remover</button>
    <a href="{% url 'lista_gastos' %}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>

{% endblock %}
